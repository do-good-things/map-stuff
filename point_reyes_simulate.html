<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point Reyes 2025 — Simulation</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <div id="sidebar">
    <div id="sidebar-header">
      <a href="/point_reyes" class="back-link">← Explore</a>
      <div id="event-title">Point Reyes</div>
      <div id="event-subtitle">2025 · Simulation</div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">RIDERS</div>
      <div id="rider-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">NOW PLAYING</div>
      <div id="sim-now-playing" style="font-size:12px;color:#8b949e;margin-bottom:6px;">—</div>
      <div id="sim-time-display" style="font-size:12px;color:#8b949e;font-variant-numeric:tabular-nums;margin-bottom:8px;">0:00:00</div>
      <div style="margin-bottom:10px;">
        <input type="range" id="sim-scrubber" min="0" max="1000" value="0" />
      </div>
      <div id="anim-buttons">
        <button id="btn-play">▶ Play</button>
        <button id="btn-pause" disabled>⏸ Pause</button>
        <button id="btn-reset">↺ Reset</button>
      </div>
      <div id="anim-speed-row">
        <span class="speed-label">Speed</span>
        <select id="anim-speed">
          <option value="10">10×</option>
          <option value="30">30×</option>
          <option value="60" selected>60×</option>
          <option value="120">120×</option>
          <option value="200">200×</option>
          <option value="300">300×</option>
          <option value="500">500×</option>
          <option value="750">750×</option>
          <option value="1000">1000×</option>
          <option value="1500">1500×</option>
          <option value="2000">2000×</option>
          <option value="3000">3000×</option>
        </select>
      </div>
      <div id="ride-jump-buttons">
        <!-- Populated by JS based on ride count -->
      </div>
    </div>
  </div>

  <div id="map"></div>

  <script src="/point_reyes_simulate_app.js"></script>
</body>
</html>
